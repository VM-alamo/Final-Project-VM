<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fluffy Kitty Cart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="Styles3.css" />
</head>
<body>

  <header class="header">
    <h1 class="logo">Fluffy Kitty Shop</h1>
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="index2.html">Shop</a>
      <a class="active" href="index3.html">Cart</a>
    </nav>
  </header>

  <main class="cart">
    <h2>Your Shopping Cart ⭐</h2>

    <div class="cart-item">
      <img src="Plush-AI.png" alt="Fluffy Kitty Plush">
      <div class="item-info">
        <h3>Fluffy Kitty Plush</h3>
        <p class="price">$39.99</p>
        <div class="qty">
          <button>-</button>
          <span>1</span>
          <button>+</button>
        </div>
      </div>
      <button class="remove">✕</button>
    </div>

    <div class="cart-item">
      <img src="TShirt-AI.png" alt="Cute Kitty Shirt">
      <div class="item-info">
        <h3>Cute Kitty T‑Shirt</h3>
        <p class="price">$18.00</p>
        <div class="qty">
          <button>-</button>
          <span>2</span>
          <button>+</button>
        </div>
      </div>
      <button class="remove">✕</button>
    </div>

    <div class="summary">
      <div class="line">
        <span>Subtotal</span>
        <span>$58.00</span>
      </div>
      <div class="line">
        <span>Shipping</span>
        <span>FREE ✧</span>
      </div>
      <div class="total">
        <span>Total</span>
        <span>$61.00</span>
      </div>
      <button class="checkout" onclick="window.location.href='index7.html'">Checkout ♡</button>
    </div>

  </main>

  <footer class="footer">
    © 2026 Fluffy Kitty Shop ✨
  </footer>

</body>
</html>
